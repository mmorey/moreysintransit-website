                        - generic [ref=e430]:
                          - paragraph [ref=e431]: Excellent instructions and very clean install Matt! I really appreciate your website.
                          - paragraph [ref=e432]: Gayle’s comment made we want to confirm that zero screws or butyl tape would be used for any part of this method that she is talking about, only adhesives? That would simplify the install considerably and mean that the only hole in the roof would be the 14″ x 14″ square one? Please let me know if I have misunderstood any of that.
