          - heading "Time" [level=2] [ref=e76]
          - paragraph [ref=e77]: We started Saturday around 1:30 PM and finished before lunch on Sunday. Just in time for the little bit of rain we had on Monday morning. It was around 8 hours of actual work not counting the time for the adhesive to cure.
