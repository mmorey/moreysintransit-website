          - heading "Instructions" [level=2] [ref=e82]
          - paragraph [ref=e83]: The first step is to decide where you want to install the fan. We choose the rear of the roof between that last 2 ceiling ribs, 21″ in front of the rear door frame. This spot will be above our future bed and leaves ample room to install solar panels. It also just so happens that the Transit has almost 14″ between the 2 roof ribs.
          - generic [ref=e84]:
            - link "Selecting Ceiling Location" [ref=e85] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/empty-ceiling-1024x576.jpg
              - img "Selecting Ceiling Location" [ref=e86]
            - paragraph [ref=e87]: We decided to put the fan between the rear 2 ribs.
          - paragraph [ref=e88]: The Transit roof is thin and dents easily which makes installing a roof fan difficult. The location we chose for the fan is just close enough to lean over from the edge and perform the whole install. Our ladder was just tall enough to lean against the rear of the van. We put a thick blanket between the ladder and the van to protect the surface.
          - generic [ref=e89]:
            - link "Ladder leaning against roof of van" [ref=e90] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-2-e1459306606323-890x1024.jpg
              - img "Ladder leaning against roof of van" [ref=e91]
            - paragraph [ref=e92]: Use a blanket to cushion ladder against roof of van.
          - paragraph [ref=e93]: Then we prepared the top of the van by washing it with soap and water, and cleaning it with acetone.
          - generic [ref=e94]:
            - link "Remove dirt and debris from roof":
              - /url: /wp-content/uploads/2016/03/cleaning-roof.gif
              - img "Remove dirt and debris from roof"
            - paragraph [ref=e95]: Clean surface of roof with acetone.
          - paragraph [ref=e96]: We then taped off the area where the fan was going to go on the inside and outside with cardboard and painters tape. This stops any of the metal filings from cutting and drilling from landing on the paint.
          - generic [ref=e97]:
            - link "Using painters tap to mark ceiling":
              - /url: /wp-content/uploads/2016/03/taping-ceiling.gif
              - img "Using painters tap to mark ceiling"
            - paragraph [ref=e98]: Use painters tape to mark off location of vent fan.
          - generic [ref=e99]:
            - link "Used painters tape to make a square where the fan will go" [ref=e100] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-25-1024x683.jpg
              - img "Used painters tape to make a square where the fan will go" [ref=e101]
            - paragraph [ref=e102]: Painters tape marking off where the vent fan will go.
          - paragraph [ref=e103]: Next we drilled holes in the 4 corners, starting with a small drill bit and ending with the largest drill bit we had. The hole needs to be just large enough to fit the jigsaw blade. While drilling the holes we used a shop vacuum to suck up all the little metal filings. No turning back now…eek!
          - generic [ref=e104]:
            - link "Drilling into the van roof" [ref=e105] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/drilling-into-ceiling-1024x576.jpg
              - img "Drilling into the van roof" [ref=e106]
            - paragraph [ref=e107]: Use a power drill to put holes in the 4 corners.
          - paragraph [ref=e108]:
            - text: The next step is to connect the holes with a jigsaw and a metal cutting blade. This is where we ran into some troubles. The
            - link "jigsaw" [ref=e109] [cursor=pointer]:
              - /url: http://www.harborfreight.com/5-amp-heavy-duty-tool-free-variable-speed-orbital-jig-saw-62422.html
            - text: we owned was not strong enough to hold the blade in place. We tried several times but the blade would just fall out onto the van floor. Luckily our friend happened to be at Home Depot and picked up this
            - link "gem" [ref=e110] [cursor=pointer]:
              - /url: http://amzn.to/1pJk8r2
            - text: for us. It worked a thousand times better, and after our brief work stoppage, we were back in business.
          - paragraph [ref=e111]: While Matt was cutting from the top I was below vacuuming any metal filings coming off. After cutting each side we used duct tape to support it.
          - generic [ref=e112]:
            - link "Cutting the roof with a jigsaw" [ref=e113] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-ScreenShot01.jpg
              - img "Cutting the roof with a jigsaw" [ref=e114]
            - paragraph [ref=e115]: Using a jigsaw, cut along the tape to connect the drilled holes.
          - generic [ref=e116]:
            - link "Looking up at the ceiling after the cut was finished" [ref=e117] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-50-1024x683.jpg
              - img "Looking up at the ceiling after the cut was finished" [ref=e118]
            - paragraph [ref=e119]: Matt after finishing the cut. The edges aren’t perfectly straight but that is fine as it is covered by the fan flange.
          - paragraph [ref=e120]: After cutting the the hole, use a metal file and sandpaper to smooth out the edges.
          - generic [ref=e121]:
            - link "A metal file was used on the square after it was cut" [ref=e122] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/IMG_0433-e1459299404462-768x1024.jpg
              - img "A metal file was used on the square after it was cut" [ref=e123]
            - paragraph [ref=e124]: Use a metal file to smooth out the rough edges.
          - paragraph [ref=e125]: Next apply a coat of white paint to the edges to prevent any rust from forming. We did 2 coats and went real heavy on the second coat and let it dry for about an hour.
          - generic [ref=e126]:
            - link "Painting edges of cut with white paint" [ref=e127] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-65-1024x683.jpg
              - img "Painting edges of cut with white paint" [ref=e128]
            - paragraph [ref=e129]: Use while enamel paint and a foam sponge brush to coat raw edges.
          - paragraph [ref=e130]:
            - text: The Transit roof is curved but most roof fans assume a flat surface. Some Transit owners have used
            - link "JB Weld" [ref=e131] [cursor=pointer]:
              - /url: http://www.fordtransitusaforum.com/ford-transit-general-discussion/23577-installing-maxxfan-weekend.html
            - text: and
            - link "adhesive caulk" [ref=e132] [cursor=pointer]:
              - /url: http://www.fordtransitusaforum.com/camper-vans-conversions/6617-thaden-diy-camper-hr-long.html#post94177
            - text: to flatten the area out. Some have used
            - link "spacers" [ref=e133] [cursor=pointer]:
              - /url: http://www.ortontransit.info/roofvent2.php
            - text: . We decided to use an
            - link "adaptor (Ebay affiliate link)" [ref=e134] [cursor=pointer]:
              - /url: http://rover.ebay.com/rover/1/711-53200-19255-0/1?icep_ff3=2&pub=5575161272&toolid=10001&campid=5337839244&customid=&icep_item=131748730820&ipn=psmain&icep_vectorid=229466&kwid=902099&mtid=824&kw=lg
            - text: on the top of the roof which turns the curved roof into a flat mating surface for the fan base.
          - paragraph [ref=e135]: You can also buy an adaptor for the inside of the roof. But it won’t fit in the rear location because the roof ribs are too close together. If installing between the middle ribs or the front ribs the inside adapter will work.
          - paragraph [ref=e136]:
            - text: We cleaned the roof and adapter with acetone, and then used
            - link "3M 4200" [ref=e137] [cursor=pointer]:
              - /url: http://amzn.to/1LYTHrX
            - text: adhesive to attach the adaptor to the roof. 3 beads on all sides seems like a good amount.
          - paragraph [ref=e138]:
            - text: We choose
            - link "3M 4200" [ref=e139] [cursor=pointer]:
              - /url: http://amzn.to/1LYTHrX
            - text: because it allows
            - link "future disassembly of parts" [ref=e140] [cursor=pointer]:
              - /url: http://multimedia.3m.com/mws/media/323623O/adhesive-sealant-brochure.pdf
            - text: . If we were to use
            - link "3M 5200" [ref=e141] [cursor=pointer]:
              - /url: http://amzn.to/1MSVs4B
            - text: I’m guessing the paint would peel off if we ever tried to take the adapter off.
          - generic [ref=e142]:
            - link "Adhesive being applied to adapter":
              - /url: /wp-content/uploads/2016/03/applying-adhesive.gif
              - img "Adhesive being applied to adapter"
            - paragraph [ref=e143]: 3 beads of the 3M 4200 adhesive was used on each side of the adapter.
          - generic [ref=e144]:
            - link "3M adhesive close up" [ref=e145] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-91-1024x683.jpg
              - img "3M adhesive close up" [ref=e146]
            - paragraph [ref=e147]: Close up to see how much adhesive was applied to the adapter.
          - paragraph [ref=e148]: After placing the adaptor on the roof, we used 4 clamps to gently hold it down. You don’t need to clamp it down super tight, just enough to make sure there is a good seal. If you clamp it too much you will bend the roof.
          - paragraph [ref=e149]:
            - text: By this point, the sun was starting to set, we were tired, and the
            - link "3M 4200" [ref=e150] [cursor=pointer]:
              - /url: http://amzn.to/1LYTHrX
            - text: adhesive needed time to cure. We covered the van with a cardboard box and plastic tarp just in case it rained overnight, and called it a day.
          - generic [ref=e151]:
            - link "4 clamps being used to hold down the adapter" [ref=e152] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-122-1024x683.jpg
              - img "4 clamps being used to hold down the adapter" [ref=e153]
            - paragraph [ref=e154]: Clamped each side to allow 3M 4200 adhesive time to cure.
          - paragraph [ref=e155]: Sunday morning we started around 8 am to be sure it was finished before the forecasted rain on Monday. The adaptor had over 12 hours to adhere to the 3M 4200 and van roof. We put a little bit of pressure on it and determined it wasn’t going anywhere.
          - generic [ref=e156]:
            - link "Adapter sealed to roof top" [ref=e157] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-127-1024x683.jpg
              - img "Adapter sealed to roof top" [ref=e158]
            - paragraph [ref=e159]: Close up of adapter adhered to roof.
          - paragraph [ref=e160]:
            - text: It was now time to install the fan flange to the adapter. The surface was first cleaned with isopropyl alcohol. The
            - link "fan instructions" [ref=e161] [cursor=pointer]:
              - /url: http://www.airxcel.com/maxxair/products/fans/maxxfan-deluxe/docs/default-source/maxxair/fans/maxxfan-deluxe/11b90001k_maxxfan-deluxe-install-rev-b-01-2016
            - text: say not to use acetone and the 3M 4200 instructions say not to use alcohol. So when cleaning anything that touches the 3M 4200 we used acetone and for the fan we used alcohol.
          - paragraph [ref=e162]:
            - text: Next we added
            - link "butyl seal tape" [ref=e163] [cursor=pointer]:
              - /url: http://amzn.to/1UUEZF4
            - text: to the bottom of the flange. The flange is just wide enough to fit 2 strips of the tape.
          - generic [ref=e164]:
            - link "Fan flange with butyl tape":
              - /url: /wp-content/uploads/2016/03/applying-butyl-tape.gif
              - img "Fan flange with butyl tape"
            - paragraph [ref=e165]: Us applying the butyl tape to the bottom side of the MaxxFan adapter flange.
          - paragraph [ref=e166]: "The flange was then attached to the adapter using #10 zinc coated wood screws and washers. The thicker side used #10 7/8″ and the thinner side used #10 3/4″. First pre-drill the screw holes. We did not drill into the van roof, just into the adapter. We recommend hand tightening the screws to avoid cracking the plastic fan flange."
          - paragraph [ref=e167]: We wanted to avoid using screws and just use 3M 4200 to attach the flange to the adapter. But 3M 4200 contains Xylene which according to the fan instructions shouldn’t be used on the plastic. In hindsight, it probably wouldn’t have mattered and we should of done a small test on the plastic to see what would have happened.
          - generic [ref=e168]:
            - link "Screwing flange to adapter":
              - /url: /wp-content/uploads/2016/03/screwing-in-screws.gif
              - img "Screwing flange to adapter"
            - paragraph [ref=e169]: "Screwing in the #10 screws with washers through the flange into the pre-drilled holes in the adapter."
          - generic [ref=e170]:
            - link "Screwing the flange to the adapter" [ref=e171] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-165-1024x683.jpg
              - img "Screwing the flange to the adapter" [ref=e172]
            - paragraph [ref=e173]: Using the hole in the roof to install the screws instead of leaning over from the ladder.
          - paragraph [ref=e174]: After the flange was screwed down any excess butyl tape was removed using a box cutter.
          - paragraph [ref=e175]:
            - text: Next
            - link "Eternabond" [ref=e176] [cursor=pointer]:
              - /url: http://amzn.to/1M0scy9
            - text: tape was laid down on the van, adapter, and fan flange. The white Eternabond tape is primarily used as a weather seal to keep water from leaking into the van and secondarily as another adhesive keeping the fan attached to the van. The Eternabond is extremely sticky, so be cautious while installing it, because once it is down, it is pretty impossible to remove.
          - paragraph [ref=e177]:
            - text: After you place the tape down use your hand to apply pressure and then follow that up with a
            - link "metal seam roller" [ref=e178] [cursor=pointer]:
              - /url: http://amzn.to/1MBxY9B
            - text: .
          - generic [ref=e179]:
            - link "Eternabond tape install" [ref=e180] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-209-1024x683.jpg
              - img "Eternabond tape install" [ref=e181]
            - paragraph [ref=e182]: Installing the Eternabond tape.
          - generic [ref=e183]:
            - link "Close up of Eternabond tape" [ref=e184] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-216-1024x683.jpg
              - img "Close up of Eternabond tape" [ref=e185]
            - paragraph [ref=e186]: It might not look pretty, but I do not see any water getting through that tape.
          - paragraph [ref=e187]: It was now time to actually place the fan on the roof. This part was easy, guide the wires down through the hole and then place the opened fan on top of the flange. The fan instructions require you to manually open the fan before installation. While Matt was on top of the van, I was down below and used a thin flat head screwdriver to push up the metal clips slightly. Then Matt screwed in the fan with the 4 provided screws.
          - paragraph [ref=e188]: If you want you can also take of the MaxxFan stickers. They peel right off.
          - generic [ref=e189]:
            - link "Roof vent installed on flange" [ref=e190] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-221-1024x683.jpg
              - img "Roof vent installed on flange" [ref=e191]
            - paragraph [ref=e192]: Roof vent installed on top of roof.
          - paragraph [ref=e193]:
            - text: Next was the moment of truth. Would the fan work? We hooked it up using our
            - link "car jump starter" [ref=e194] [cursor=pointer]:
              - /url: http://amzn.to/1q2JpgC
            - text: and crossed our fingers.
          - generic [ref=e195]:
            - link "Fan Closing when powered up":
              - /url: /wp-content/uploads/2016/03/fan-closing-for-the-first-time.gif
              - img "Fan Closing when powered up"
            - paragraph [ref=e196]: Fan closing for the first time
          - paragraph [ref=e197]: With a sigh of relief, the vent closed when powered on, like the instructions stated it would. The fan works!
          - generic [ref=e198]:
            - link "Fan inside rotating" [ref=e199] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/2016RoofVent-228-1024x683.jpg
              - img "Fan inside rotating" [ref=e200]
            - paragraph [ref=e201]: Fan rotating from the inside of the van.
          - generic [ref=e202]:
            - link "Finished Roof Fan Install" [ref=e203] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/IMG_0677-Edited-1024x768.jpg
              - img "Finished Roof Fan Install" [ref=e204]
            - paragraph [ref=e205]: Gidget with the fan installed.
          - paragraph [ref=e206]: Once we install our house electrical system we will wire up the fan. And once the ceiling is done we can place the interior trim piece to cover the raw edges.
          - paragraph [ref=e207]:
            - text: If we did the install over we would have done a better job covering the top of the van to prevent metal filings from landing on the paint. We did a pretty good job with cardboard but it still allowed some filing to work there way under the cardboard. We would have used 3M 4200 to mount the flange to the adapter plate instead of screws. Finally, we would have used
            - link "lap sealant" [ref=e208] [cursor=pointer]:
              - /url: http://amzn.to/1RyHgjm
            - text: instead of the Eternabond tape as the end result isn’t as clean looking as it could have been.
          - generic [ref=e210]:
