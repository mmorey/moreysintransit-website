                - paragraph [ref=e496]: I would add to John’s admonition regarding acetone…it is a a very powerful solvent, and shouldn’t be handled without PPE (rubber gloves, respirator) and away from any ignition source. It’s very volatile.
            - listitem [ref=e497]:
