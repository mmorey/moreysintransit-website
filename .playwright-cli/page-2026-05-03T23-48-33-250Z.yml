                  - /url: https://moreysintransit.com/install-roof-fan-van/?replytocom=940#respond
                  - text: Reply
                - generic [ref=e478]:
                  - generic [ref=e479]: John
                  - generic [ref=e480]: January 25, 2018
                - generic [ref=e481]:
                  - paragraph [ref=e482]: Thanks for this well documented and clearly explained installation. You guys do a great job on all your posts.
                  - paragraph [ref=e483]: As a autobody professional, I would caution you against using acetone for a surface prep cleaner on painted surfaces. Acetone is far too harsh a solvent for that purpose and will partially dissolve the clearcoat, leaving it permanently damaged. I don’t mean that your roof’s going to cave in, but it doesn’t help the long term life of the paint, especially since the roof surface takes the most weather abuse.
                  - paragraph [ref=e484]:
                    - text: "Next time you need to prep a painted surface, I recommend using a standard automotive wax and grease remover (available from any autobody supply store) like PPG DX330, or if you are a dedicated Amazonian, there’s also this wax and tar remover:"
                    - link "https://www.amazon.com/Rust-Oleum-Automotive-251475-32-Ounce-Remover/dp/B006ZLQELW/ref=sr_1_5?ie=UTF8&qid=1516893318&sr=8-5&keywords=wax+grease+remover" [ref=e485] [cursor=pointer]:
                      - /url: https://www.amazon.com/Rust-Oleum-Automotive-251475-32-Ounce-Remover/dp/B006ZLQELW/ref=sr_1_5?ie=UTF8&qid=1516893318&sr=8-5&keywords=wax+grease+remover
                  - paragraph [ref=e486]: After the work is finished, apply any standard automotive wax to restore protection over the paint.
