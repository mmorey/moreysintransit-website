                  - generic [ref=e504]: September 24, 2019
                - paragraph [ref=e506]: Matt – I have the same van as you guys with no windows that open. I do not plan on adding any windows and was wondering how much air does the one Maxx-Air move and does it keep you comfortable when camping and the van is shut up. I was considering an AC unit and one Maxx-Air but now thinking of NO AC unit and maybe two fans?? Do you think the one fan is sufficient as you have? Would you think two fans would be better?
            - listitem [ref=e507]:
              - generic [ref=e510]:
                - link "Reply to Brett Hawton" [ref=e511] [cursor=pointer]:
                  - /url: https://moreysintransit.com/install-roof-fan-van/?replytocom=3612#respond
                  - text: Reply
                - generic [ref=e512]:
                  - generic [ref=e513]: Brett Hawton
                  - generic [ref=e514]: October 18, 2019
                - paragraph [ref=e516]:
                  - text: Eternabond is meant to be used on flat surfaces!!!
                  - text: How do I know???
                  - text: I read this blog and used it on my brand new van only to find water squishing out when I pressed on the tape after a rainstorm. It took me 8 hours using a heat gun, plastic scraper, and mineral spirits to remove this crap from both my fans so I can have the entire roof & fan frames coated with Line-X. Do not use Eternabond for this application unless you want a leaky/rusty van.
