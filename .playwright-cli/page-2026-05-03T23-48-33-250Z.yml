        - generic [ref=e28]:
          - text: On March 30, 2016 by
          - link "Tricia" [ref=e29] [cursor=pointer]:
            - /url: ../author/tricia/index.html
          - text: "-"
          - link "how-to" [ref=e30] [cursor=pointer]:
