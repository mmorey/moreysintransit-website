        - generic [ref=e32]:
          - paragraph [ref=e33]: Tricia here, writing my first post! Over the weekend we tackled the daunting task of permanently modifying Gidget by installing a roof fan. Neither of us have had the pleasure of cutting a huge hole in a vehicle, so it was a little nerve-wracking.
          - paragraph [ref=e34]:
            - text: "When planning our van build we decided not to install a rooftop air conditioning unit. They tend to remove any notions of stealth, are loud, and need a lot of power to operate. But we also want some level of comfort so we settled on a roof fan. After significant research we discovered there is only 2 serious manufactures:"
            - link "Fan-Tastic" [ref=e35] [cursor=pointer]:
              - /url: http://amzn.to/1MBsZpp
            - text: and
            - link "MaxxAir" [ref=e36] [cursor=pointer]:
              - /url: http://amzn.to/1pKFjc8
            - text: . We went with the
            - link "MaxxAir MAXXFAN Deluxe 7000K" [ref=e37] [cursor=pointer]:
              - /url: http://amzn.to/1qe8pRL
            - text: fan because the lid can be open when its raining and when driving.
          - paragraph
          - generic [ref=e38]:
            - link "Finished Roof Fan Install" [ref=e39] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/IMG_0677-Edited-1024x768.jpg
              - img "Finished Roof Fan Install" [ref=e40]
            - paragraph [ref=e41]: Gidget with the fan installed.
          - generic [ref=e42]:
            - link "Side View of Van and Fan" [ref=e43] [cursor=pointer]:
              - /url: /wp-content/uploads/2016/03/JPEG-image-944059012F6A-1-1024x768.jpg
              - img "Side View of Van and Fan" [ref=e44]
            - paragraph [ref=e45]: Side view of Gidget with fan installed.
