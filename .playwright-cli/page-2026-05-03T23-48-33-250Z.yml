                          - paragraph [ref=e434]: I started my Transit camper van conversion with installing 4 windows before my construction buddy left town for 2 months. After working with him on the first 2 windows, I did most of the install of the final 2. So, I think I am ready to tackle this Maxxfan installation solo.
