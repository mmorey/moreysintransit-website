                            - generic [ref=e445]:
                              - blockquote [ref=e446]:
                                - paragraph [ref=e447]: Gayle’s comment made we want to confirm that zero screws or butyl tape would be used for any part of this method that she is talking about, only adhesives? That would simplify the install considerably and mean that the only hole in the roof would be the 14″ x 14″ square one? Please let me know if I have misunderstood any of that.
                              - paragraph [ref=e448]: Yes, you could do the install with just adhesives and only a single 14″ square hole. My install only has one single 14″ square hole.
                              - blockquote [ref=e449]:
                                - paragraph [ref=e450]: What are the pros and cons of having the fan way towards the back? I thought about installing it further forward, so I could reach the controls without getting on the platform bed. I guess the air flow from the forward windows would be more throughout the van with the fan at the back?
                              - paragraph [ref=e451]: The fan I have came with a remote so I can turn it on from the front cab without getting on the bed. Unless you put a vent in the floor, most of the airflow will bypass the living quarters, it pretty much just comes in the front windows, goes to the roof and then out the fan. I plan on adding a vent behind our fride on the floor to help cool the fridge coils and improve the air flow. We choose the back location as we have a solar panel on the roof towards the front of the van that would have blocked the fan.
